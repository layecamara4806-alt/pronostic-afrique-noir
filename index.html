<!DOCTYPE html>
<html>

<head>

<title>Pronostic Afrique Noir</title>

<style>

body{
font-family:Arial;
background:black;
color:white;
text-align:center;
}

h1{
margin-top:30px;
}

.container{
margin-top:40px;
}

textarea{
width:400px;
height:120px;
font-size:16px;
}

button{
padding:12px;
margin:8px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:30px;
border:1px solid white;
padding:20px;
width:60%;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<h1>PRONOSTIC AFRIQUE NOIR</h1>

<h3>Plateforme IA de Pronostics Multi-Sports</h3>

<div class="container">

<p>Colle un match ou un lien :</p>

<textarea id="match"
placeholder="Exemple :
Lakers vs Boston
ou
https://scores24.live/...">
</textarea>

<br>

<button onclick="analyse()">ANALYSER</button>

<br><br>

<button onclick="chatgpt()">ChatGPT</button>

<button onclick="gemini()">Gemini</button>

<button onclick="perplexity()">Perplexity</button>

</div>

<div class="result" id="result">

Résultat analyse apparaîtra ici.

</div>

<script>
function analyse(){

var texte =
document.getElementById("match").value.toLowerCase();

var sport="Inconnu";

if(
texte.includes("vs")
|| texte.includes("basket")
|| texte.includes("nba")
){
sport="Basketball";
}

else if(
texte.includes("fc")
|| texte.includes("foot")
|| texte.includes("soccer")
){
sport="Football";
}

else if(
texte.includes("tennis")
){
sport="Tennis";
}

var confiance =
Math.floor(Math.random()*25)+65;

document.getElementById("result").innerHTML=

"<h2>PRONOSTIC AFRIQUE NOIR</h2>"

+

"<br><b>Entrée :</b> "
+
texte

+

"<br><br><b>Sport détecté :</b> "
+
sport

+

"<br><br><b>Analyse :</b>"

+

"<br>- Forme récente étudiée"

+

"<br>- Tendances générales"

+

"<br>- Niveau de risque moyen"

+

"<br><br><b>Pronostic :</b>"

+

"<br>Equipe favorite probable"

+

"<br><br><b>Confiance :</b> "
+
confiance
+
"%";

}






function chatgpt(){

window.open("https://chat.openai.com");

}

function gemini(){

window.open("https://aistudio.google.com");

}

function perplexity(){

window.open("https://perplexity.ai");

}

</script>

</body>

</html>
